---
layout: default
---
<!-- Post Header -->
<div style="background:linear-gradient(135deg,#0d2b5e,#1a4a8a);padding:100px 0 50px;text-align:center;color:#f5f0e8;">
  <div class="container">
    {% if page.category %}
    <span style="display:inline-block;background:#e8d5a3;color:#0d2b5e;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;padding:3px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:16px;">{{ page.category }}</span>
    {% endif %}
    <h1 style="font-size:2.2rem;font-weight:700;color:#fff;max-width:800px;margin:0 auto 16px;line-height:1.3;">{{ page.title }}</h1>
    <p style="color:#e8d5a3;font-size:0.9rem;">
      <i class="fas fa-calendar-alt me-1"></i>{{ page.date | date: "%B %d, %Y" }}
      {% if page.author %}&nbsp;·&nbsp;<i class="fas fa-user me-1"></i>{{ page.author }}{% endif %}
    </p>
  </div>
</div>

<!-- Post Content -->
<section style="padding:60px 0;background:#f5f0e8;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        {% if page.image %}
        <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%;max-height:420px;object-fit:cover;border-radius:10px;margin-bottom:2rem;box-shadow:0 8px 30px rgba(13,43,94,0.15);">
        {% endif %}

        <div style="background:#fff;border-radius:10px;padding:2.5rem;box-shadow:0 4px 20px rgba(13,43,94,0.08);font-size:1.05rem;line-height:1.85;color:#333;">
          {{ content }}
        </div>

        <!-- Back button -->
        <div style="margin-top:2rem;">
          <a href="/blog/" style="display:inline-flex;align-items:center;gap:8px;color:#1a4a8a;font-weight:700;text-decoration:none;padding:10px 20px;border:2px solid #1a4a8a;border-radius:6px;transition:all 0.2s;" onmouseover="this.style.background='#1a4a8a';this.style.color='#f5f0e8';" onmouseout="this.style.background='';this.style.color='#1a4a8a';">
            <i class="fas fa-arrow-left"></i> Back to Blog
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
